name: Build 4rVivi

on:
  push:
    branches: [ "**" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore 4rVivi.sln

      # Capture test logs
      - name: Test (Core) — non-blocking
        continue-on-error: true
        id: test
        run: |
          dotnet test tests/4rVivi.Core.Tests/4rVivi.Core.Tests.csproj -c Release --no-restore --logger "console;verbosity=normal" > test_log.txt 2>&1 || true
        shell: pwsh

      # Upload test logs if the test step fails
      - name: Upload Test Logs
        if: always() && steps.test.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: TestLogs
          path: test_log.txt

      # Capture publish logs
      - name: Publish single-file exe (win-x64, self-contained)
        id: publish
        run: |
          dotnet publish src/4rVivi.App/4rVivi.App.csproj
            -c Release
            -r win-x64
            --self-contained true
            -p:PublishSingleFile=true
            -p:IncludeNativeLibrariesForSelfExtract=true
            -p:EnableCompressionInSingleFile=true
            -o publish > publish_log.txt 2>&1 || true
        shell: pwsh

      # Upload publish logs if the publish step fails
      - name: Upload Publish Logs
        if: always() && steps.publish.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: PublishLogs
          path: publish_log.txt

      - name: List publish output
        if: always()
        shell: pwsh
        run: Get-ChildItem -Recurse publish | Select-Object FullName, Length | Format-Table -AutoSize

      - name: Verify exe exists
        shell: pwsh
        run: |
          if (-not (Test-Path "publish/4rVivi.exe")) { Write-Error "4rVivi.exe was not produced — see the publish step log."; exit 1 }
          Write-Host "OK: $((Get-Item 'publish/4rVivi.exe').Length) bytes"

      - name: Upload exe
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: 4rVivi
          path: publish/4rVivi.exe
          if-no-files-found: error
