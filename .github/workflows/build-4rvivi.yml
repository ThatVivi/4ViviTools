name: Build 4rVivi

on:
  push:
    branches: [ "**" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore 4rVivi.sln

      - name: Test (Core)
        run: dotnet test tests/4rVivi.Core.Tests/4rVivi.Core.Tests.csproj -c Release --no-restore

      - name: Publish single-file exe
        run: >
          dotnet publish src/4rVivi.App/4rVivi.App.csproj
          -c Release -r win-x64 --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:EnableCompressionInSingleFile=true
          -o publish

      - name: Upload exe
        uses: actions/upload-artifact@v4
        with:
          name: 4rVivi
          path: publish/4rVivi.exe
          if-no-files-found: error
