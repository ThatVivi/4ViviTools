name: Build 4rVivi

on:
  push:
    branches: [ "**" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore 4rVivi.sln

      - name: Test (Core) — non-blocking
        continue-on-error: true
        run: dotnet test tests/4rVivi.Core.Tests/4rVivi.Core.Tests.csproj -c Release --no-restore --logger "console;verbosity=normal"

      - name: Publish single-file exe (win-x64, self-contained)
        run: >
          dotnet publish src/4rVivi.App/4rVivi.App.csproj
          -c Release
          -r win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:EnableCompressionInSingleFile=true
          -o publish

      - name: List publish output
        if: always()
        shell: pwsh
        run: Get-ChildItem -Recurse publish | Select-Object FullName, Length | Format-Table -AutoSize

      - name: Verify exe exists
        shell: pwsh
        run: |
          if (-not (Test-Path "publish/4rVivi.exe")) { Write-Error "4rVivi.exe was not produced — see the publish step log."; exit 1 }
          Write-Host "OK: $((Get-Item 'publish/4rVivi.exe').Length) bytes"

      - name: Upload exe
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: 4rVivi
          path: publish/4rVivi.exe
          if-no-files-found: error
