name: Build 4rVivi

on:
  push:
    branches: [ "**" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore 4rVivi.sln

      - name: Test (Core) — non-blocking
        continue-on-error: true
        id: test
        run: dotnet test tests/4rVivi.Core.Tests/4rVivi.Core.Tests.csproj -c Release --no-restore --logger "console;verbosity=normal" > test_log.txt 2>&1 || true
        shell: pwsh

      - name: Upload Test Logs
        if: always() && steps.test.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: TestLogs
          path: test_log.txt

      # Publish step: Capture full output and fail if the command fails
      - name: Publish single-file exe (win-x64, self-contained)
        id: publish
        run: |
          dotnet publish src/4rVivi.App/4rVivi.App.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:EnableCompressionInSingleFile=true `
            -o publish > publish_log.txt 2>&1
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
        shell: pwsh

      # Always upload the publish log
      - name: Upload Publish Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: PublishLogs
          path: publish_log.txt

      - name: List publish output
        if: always()
        shell: pwsh
        run: Get-ChildItem -Recurse publish | Select-Object FullName, Length | Format-Table -AutoSize

      # Only upload the EXE if it exists
      - name: Upload exe
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: 4rVivi
          path: publish/4rVivi.exe
          if-no-files-found: error
